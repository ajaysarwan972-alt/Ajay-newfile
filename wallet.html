<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f2f2f2;margin:0;padding:10px;}

.topbar{display:flex;justify-content:space-between;margin-bottom:15px;}
.idbox{background:green;color:#fff;padding:8px 15px;border-radius:20px;}
.walletbox{background:red;color:#fff;padding:8px 15px;border-radius:20px;}

.card{background:#fff;padding:20px;border-radius:15px;margin-bottom:20px;text-align:center;}
.balance{font-size:28px;font-weight:bold;}

.btns{display:flex;gap:10px;margin-top:15px;}
.btn{flex:1;padding:12px;border:none;border-radius:10px;color:#fff;font-weight:bold;}
.deposit{background:green;}
.withdraw{background:red;}

input{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:1px solid #ccc;}

.main-btn{width:100%;padding:12px;border:none;border-radius:10px;margin-top:10px;color:#fff;font-weight:bold;}
.green{background:#7cc84a;}
.red{background:#ff4d4d;}

.table-box{background:#fff;border-radius:15px;padding:10px;margin-bottom:20px;}

th{background:red;color:#fff;padding:10px;}
td{padding:8px;text-align:center;border-bottom:1px solid #ccc;}

.hide{display:none;}
</style>
</head>

<body>

<div class="topbar">
<div class="idbox" id="userId">ID: --</div>
<div class="walletbox" id="wallet">₹ 0</div>
</div>

<!-- ================= WALLET ================= -->
<div id="home">

<div class="card">
<div class="balance" id="mainBalance">₹ 0</div>
<div>Available Balance</div>

<div class="btns">
<button class="btn deposit" onclick="openDeposit()">ADD +</button>
<button class="btn withdraw" onclick="openWithdraw()">WID -</button>
</div>
</div>

<div class="table-box">
<h3>Deposit History</h3>
<table width="100%">
<tr><th>ID</th><th>Amount</th><th>Status</th></tr>
<tbody id="depositHistory"></tbody>
</table>
</div>

<div class="table-box">
<h3>Withdraw History</h3>
<table width="100%">
<tr><th>ID</th><th>Amount</th><th>Status</th></tr>
<tbody id="withdrawHistory"></tbody>
</table>
</div>

</div>

<!-- ================= DEPOSIT ================= -->
<div id="depositPage" class="hide">

<div class="card">
<input type="number" id="depAmount" placeholder="Enter Amount">
<button class="main-btn green" onclick="goStep2()">SUBMIT</button>
<button class="main-btn red" onclick="goHome()">BACK</button>
</div>

<div class="card hide" id="step2">
<div>Screenshot upload karo</div>

<input type="file" id="file">

<button class="main-btn green" onclick="submitDeposit()">CONFIRM</button>
</div>

</div>

<!-- ================= WITHDRAW ================= -->
<div id="withdrawPage" class="hide">

<div class="card">
<input type="number" id="withAmount" placeholder="Enter Amount">
<button class="main-btn green" onclick="submitWithdraw()">SUBMIT</button>
<button class="main-btn red" onclick="goHome()">BACK</button>
</div>

</div>

<script>

const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

let user = JSON.parse(localStorage.getItem("user"));

// LOAD USER
async function loadUser(){
let { data } = await client.from("login").select("*").eq("id",user.id).single();

userId.innerText="ID: "+data.id;
wallet.innerText="₹ "+data.balance;
mainBalance.innerText="₹ "+data.balance;
}

// LOAD DEPOSIT HISTORY
async function loadDeposit(){
let { data } = await client.from("deposit_requests")
.select("*")
.eq("user_id", user.id)
.order("id",{ascending:false});

let html="";
data.forEach(r=>{
html+=`<tr>
<td>${r.id}</td>
<td>${r.amount}</td>
<td>${r.status}</td>
</tr>`;
});

depositHistory.innerHTML = html;
}

// LOAD WITHDRAW HISTORY
async function loadWithdraw(){
let { data } = await client.from("withdraw_requests")
.select("*")
.eq("user_id", user.id)
.order("id",{ascending:false});

let html="";
data.forEach(r=>{
html+=`<tr>
<td>${r.id}</td>
<td>${r.amount}</td>
<td>${r.status}</td>
</tr>`;
});

withdrawHistory.innerHTML = html;
}

// PAGE SWITCH
function openDeposit(){
home.classList.add("hide");
depositPage.classList.remove("hide");
}

function openWithdraw(){
home.classList.add("hide");
withdrawPage.classList.remove("hide");
}

function goHome(){
home.classList.remove("hide");
depositPage.classList.add("hide");
withdrawPage.classList.add("hide");
}

// STEP
function goStep2(){
step2.classList.remove("hide");
}

// DEPOSIT
async function submitDeposit(){
let amount = Number(depAmount.value);

await client.from("deposit_requests").insert([{
user_id:user.id,
amount:amount,
status:"pending"
}]);

alert("Deposit Request Sent");
location.reload();
}

// WITHDRAW
async function submitWithdraw(){

let amount = Number(withAmount.value);

let { data } = await client.from("login").select("balance").eq("id",user.id).single();

if(data.balance < amount){
alert("Balance kam hai");
return;
}

let newBalance = data.balance - amount;

await client.from("login").update({balance:newBalance}).eq("id",user.id);

await client.from("withdraw_requests").insert([{
user_id:user.id,
amount:amount,
status:"pending"
}]);

alert("Withdraw Request Sent");
location.reload();
}

// LOAD
loadUser();
loadDeposit();
loadWithdraw();

</script>

</body>
</html>
