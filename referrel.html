<!DOCTYPE html>
<html>
<head>
<title>Referral</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;padding:20px;background:#f2f2f2;}

.box{
  background:#fff;
  padding:20px;
  border-radius:15px;
  text-align:center;
}

button{
  padding:10px 15px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:green;
  color:white;
}
</style>
</head>

<body>

<div class="box">
  <h2>Refer & Earn 🔥</h2>

  <p id="link"></p>

  <button onclick="copyLink()">Copy Link</button>
  <button onclick="shareApp()">Share</button>

  <h3 id="team"></h3>
</div>

<script>
const client = supabase.createClient(
  "https://katbdbzoufiblnnsoxkk.supabase.co",
  "sb_publishable_XXXX"
);

let user = JSON.parse(localStorage.getItem("user"));

let link = window.location.origin + "?ref=" + user.id;

document.getElementById("link").innerText = link;

// COPY
function copyLink(){
  navigator.clipboard.writeText(link);
  alert("Copied!");
}

// SHARE
function shareApp(){
  navigator.share({
    title:"Join Now",
    text:"Mere link se join karo",
    url:link
  });
}

// TEAM COUNT
async function loadTeam(){
  let { data } = await client
  .from("login")
  .select("*")
  .eq("ref_by", user.id);

  document.getElementById("team").innerText =
    "Total Team: " + data.length;
}

loadTeam();
</script>

</body>
</html>
