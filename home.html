<!DOCTYPE html>
<html>
<head>
<title>Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

/* TOP */
#menuBtn{
  position:fixed;
  left:15px;
  top:20px;
  font-size:22px;
}

#userId{
  position:fixed;
  left:60px;
  top:15px;
  background:green;
  color:white;
  padding:8px 18px;
  border-radius:20px;
  font-weight:bold;
}

#wallet{
  position:fixed;
  right:15px;
  top:15px;
  background:red;
  color:white;
  padding:8px 18px;
  border-radius:20px;
  font-weight:bold;
}

/* TOP BUTTON */
.topBtnFull{
  margin-top:80px;
  margin-left:10px;
  width:calc(100% - 20px);
  background:#111;
  color:#fff;
  padding:14px;
  border-radius:15px;
  font-weight:bold;
  border:none;
}

/* ACTION */
.actionBar{
  display:flex;
  justify-content:space-around;
  margin-top:10px;
}

.actionBtn{
  width:30%;
  padding:12px;
  border-radius:25px;
  text-align:center;
  color:white;
  font-weight:bold;
}

.add{background:green;}
.withdraw{background:red;}
.share{background:#6c5ce7;}

/* GRID FIX */
.container{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:10px;
  padding:10px;
}

.btn{
  background:#fff;
  border:3px solid green;
  border-radius:15px;
  padding:15px;
  text-align:center;
}

.gameNumber{
  color:red;
  font-size:22px;
  font-weight:bold;
}

.gameTime{
  color:#1e73be;
}

.status img{
  width:60px;
}
</style>
</head>

<body>

<div id="menuBtn">☰</div>
<div id="userId">ID: 0</div>
<div id="wallet">₹ 0</div>

<button class="topBtnFull" onclick="changeMode()">
  10 ke 950
</button>

<div class="actionBar">
  <div class="actionBtn add">Add</div>
  <div class="actionBtn withdraw">Withdraw</div>
  <div class="actionBtn share">Share</div>
</div>

<div class="container" id="container"></div>

<script>
const user = JSON.parse(localStorage.getItem("user"));

const client = supabase.createClient(
  "https://katbdbzoufiblnnsoxkk.supabase.co",
  "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

/* MODE BUTTON */
function setModeBtn(){
  let mode = localStorage.getItem("gameMode");

  let btn = document.querySelector(".topBtnFull");

  if(mode === "10x"){
    btn.innerText = "1 ke 90";
  } else {
    btn.innerText = "10 ke 950";
  }
}

/* MODE CHANGE */
function changeMode(){
  let mode = localStorage.getItem("gameMode");

  if(mode === "10x"){
    localStorage.setItem("gameMode","simple");
  } else {
    localStorage.setItem("gameMode","10x");
  }

  location.reload();
}

/* WALLET */
async function loadWallet(){
  const { data } = await client
  .from("login")
  .select("balance")
  .eq("id", user.id)
  .single();

  if(data){
    document.getElementById("wallet").innerText = "₹ " + data.balance;
    document.getElementById("userId").innerText = "ID: " + user.id;
  }
}

/* TIME CHECK (FIXED) */
function checkStatus(open, close){

  let now = new Date();

  let [oh, om] = open.split(":");
  let [ch, cm] = close.split(":");

  let o = new Date();
  o.setHours(oh, om, 0);

  let c = new Date();
  c.setHours(ch, cm, 0);

  // overnight fix
  if(c < o){
    c.setDate(c.getDate() + 1);
  }

  if(now < o){
    now.setDate(now.getDate() + 1);
  }

  return now >= o && now <= c;
}

/* LOAD GAMES */
async function loadButtons(){

  let mode = localStorage.getItem("gameMode") || "simple";

  let { data } = await client
  .from("Game result")
  .select("*");

  let container = document.getElementById("container");
  container.innerHTML = "";

  data.forEach(item => {

    let closeCol = mode === "10x" ? item.close2 : item.close;

    let isOpen = checkStatus(item.open, closeCol);

    let div = document.createElement("div");
    div.className = "btn";

    div.innerHTML = `
      <div>${item.name}</div>
      <div class="gameNumber">${item.number || '**'}</div>
      <div class="gameTime">${item.open} - ${closeCol}</div>
      <div class="status">
        <img src="${isOpen 
          ? 'https://cdn-icons-png.flaticon.com/512/190/190411.png' 
          : 'https://cdn-icons-png.flaticon.com/512/463/463612.png'}">
      </div>
    `;

    if(isOpen){
      div.onclick = ()=>{
        localStorage.setItem("market", item.name);
        window.location.href = "game.html";
      }
    }

    container.appendChild(div);
  });
}

setModeBtn();
loadWallet();
loadButtons();
</script>

</body>
</html>
