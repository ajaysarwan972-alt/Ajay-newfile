<!DOCTYPE html>
<html>
<head>
<title>Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#f2f2f2;}

/* TOP */
#menuBtn{position:fixed;left:15px;top:20px;font-size:22px;z-index:999;cursor:pointer;}
#userId{position:fixed;left:60px;top:15px;background:green;color:white;padding:8px 18px;border-radius:20px;font-weight:bold;}
#wallet{position:fixed;right:15px;top:15px;background:red;color:white;padding:8px 18px;border-radius:20px;font-weight:bold;}

/* ACTION */
.actionBar{margin-top:90px;display:flex;justify-content:space-around;padding:10px;}
.actionBtn{width:30%;padding:12px;border-radius:25px;text-align:center;color:white;font-weight:bold;cursor:pointer;}
.add{background:green;}
.withdraw{background:#ff4d4d;}
.share{background:#6c5ce7;}

/* BOX */
.container{display:flex;flex-wrap:wrap;justify-content:center;margin-top:10px;padding:10px;gap:12px;}

.btn{width:calc(50% - 10px);background:#fff;border:3px solid green;border-radius:20px;padding:15px;text-align:center;}

.gameName{font-size:18px;font-weight:bold;}
.gameNumber{font-size:26px;color:red;font-weight:bold;}
.gameTime{font-size:14px;color:#1e73be;}

.hide{display:none;}

.formBox{
background:#fff;
margin:15px;
padding:15px;
border-radius:15px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
color:#fff;
font-weight:bold;
}

.green{background:green;}
.red{background:red;}
</style>
</head>

<body>

<div id="userId">ID: 0000</div>
<div id="wallet">₹ 0</div>

<!-- ACTION -->
<div class="actionBar" id="actionBar">
  <div class="actionBtn add" onclick="openDeposit()">Add Money</div>
  <div class="actionBtn withdraw" onclick="openWithdraw()">Withdraw</div>
  <div class="actionBtn share" onclick="shareApp()">Share</div>
</div>

<!-- GAME LIST -->
<div class="container" id="container"></div>

<!-- DEPOSIT -->
<div id="depositBox" class="formBox hide">
<h3>Deposit</h3>
<input type="number" id="depAmount" placeholder="Enter Amount">
<button class="green" onclick="submitDeposit()">SUBMIT</button>
<button class="red" onclick="backHome()">BACK</button>
</div>

<!-- WITHDRAW -->
<div id="withdrawBox" class="formBox hide">
<h3>Withdraw</h3>
<input type="number" id="withAmount" placeholder="Enter Amount">
<button class="green" onclick="submitWithdraw()">SUBMIT</button>
<button class="red" onclick="backHome()">BACK</button>
</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// WALLET LOAD (SAME)
async function loadWallet(){
  const { data } = await client
    .from("login")
    .select("balance")
    .eq("id", user.id)
    .single();

  document.getElementById("wallet").innerText = "₹ " + data.balance;
  document.getElementById("userId").innerText = "ID: " + user.id;
}

// SHOW DEPOSIT
function openDeposit(){
  container.style.display="none";
  actionBar.style.display="none";
  depositBox.classList.remove("hide");
}

// SHOW WITHDRAW
function openWithdraw(){
  container.style.display="none";
  actionBar.style.display="none";
  withdrawBox.classList.remove("hide");
}

// BACK
function backHome(){
  depositBox.classList.add("hide");
  withdrawBox.classList.add("hide");
  container.style.display="flex";
  actionBar.style.display="flex";
}

// DEPOSIT SYSTEM (UNCHANGED)
async function submitDeposit(){
  let amount = Number(depAmount.value);
  if(!amount) return alert("Enter amount");

  await client.from("deposit_requests").insert([{
    user_id:user.id,
    amount:amount,
    status:"pending"
  }]);

  alert("Deposit Request Sent");
  location.reload();
}

// WITHDRAW SYSTEM (UNCHANGED)
async function submitWithdraw(){

  let amount = Number(withAmount.value);

  let { data } = await client
  .from("login")
  .select("balance")
  .eq("id",user.id)
  .single();

  if(data.balance < amount){
    alert("Low balance");
    return;
  }

  await client.from("login")
  .update({balance:data.balance-amount})
  .eq("id",user.id);

  await client.from("withdraw_requests").insert([{
    user_id:user.id,
    amount:amount,
    status:"pending"
  }]);

  alert("Withdraw Request Sent");
  location.reload();
}

// SHARE
function shareApp(){
  navigator.share({
    title:"My App",
    text:"Join now",
    url:window.location.href
  });
}

loadWallet();

</script>

</body>
</html>
