<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;margin:0;background:#f1f5f9;}

.header{
display:flex;justify-content:space-between;
padding:10px;background:#fff;
}

.boxBtn{
display:flex;gap:10px;padding:10px;
}

.btn{
flex:1;padding:12px;
border-radius:10px;
text-align:center;
color:#fff;font-weight:bold;
cursor:pointer;
}

.typing{background:#3b82f6;}
.image{background:#10b981;}

.container{
padding:15px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
}

.submit{
background:green;
color:#fff;
padding:12px;
margin-top:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.note{
background:#fff3cd;
padding:10px;
margin-top:15px;
border-radius:10px;
font-size:13px;
}

.hide{display:none;}
</style>
</head>

<body>

<div class="header">
<div id="userId">ID: 0</div>
<div id="wallet">₹ 0</div>
</div>

<div class="boxBtn">
<div class="btn typing" onclick="showBox('typingBox')">Typing Game</div>
<div class="btn image" onclick="showBox('imageBox')">Image Game</div>
</div>

<div class="container">

<!-- TYPING -->
<div id="typingBox">

<textarea id="typingData" placeholder="Enter your game"></textarea>
<input type="number" id="typingAmount" placeholder="Enter Total Amount">

<div class="submit" onclick="submitTyping()">SUBMIT</div>

</div>

<!-- IMAGE -->
<div id="imageBox" class="hide">

<input type="file" id="imageInput">
<input type="number" id="imageAmount" placeholder="Enter Total Amount">

<div class="submit" onclick="submitImage()">SUBMIT</div>

</div>

</div>

<script>

const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

const user = JSON.parse(localStorage.getItem("user"));
const market = localStorage.getItem("market");

async function loadWallet(){
let {data}=await client.from("login").select("balance").eq("id",user.id).single();
wallet.innerText="₹ "+data.balance;
userId.innerText="ID: "+user.id;
}
loadWallet();

function showBox(id){
document.getElementById("typingBox").classList.add("hide");
document.getElementById("imageBox").classList.add("hide");
document.getElementById(id).classList.remove("hide");
}

//////////////////////
// ✅ TYPING FIXED
//////////////////////
async function submitTyping(){

let text=document.getElementById("typingData").value;
let amount=Number(document.getElementById("typingAmount").value);

if(!text || amount<=0){
alert("Fill all fields");
return;
}

let {data}=await client.from("login").select("balance").eq("id",user.id).single();

if(data.balance<amount){
alert("Low balance");
return;
}

// wallet cut
await client.from("login").update({
balance:data.balance-amount
}).eq("id",user.id);

// ✅ FINAL FIX
let { error } = await client.from("history").insert([{
user_id:user.id,
market:market,
typing:text,,      // 👈 typing yaha jayega
total:amount,   // 👈 amount yaha jayega
image:null
}]);

if(error){
alert(error.message);
return;
}

alert("Done");
location.reload();
}

//////////////////////
// ✅ IMAGE FIXED
//////////////////////
async function submitImage(){

let file=document.getElementById("imageInput").files[0];
let amount=Number(document.getElementById("imageAmount").value);

if(!file || amount<=0){
alert("Fill all fields");
return;
}

let fileName=Date.now()+"_"+file.name;

// upload
let { error } = await client.storage
.from("screenshots")
.upload(fileName, file);

if(error){
alert(error.message);
return;
}

// public url
let { data } = client.storage
.from("screenshots")
.getPublicUrl(fileName);

let imageUrl = data.publicUrl;

// wallet
let {data:userData}=await client.from("login").select("balance").eq("id",user.id).single();

if(userData.balance<amount){
alert("Low balance");
return;
}

await client.from("login").update({
balance:userData.balance-amount
}).eq("id",user.id);

// ✅ FINAL FIX
let { error:err2 } = await client.from("history").insert([{
user_id:user.id,
market:market,
data:null,
total:amount,
image:imageUrl
}]);

if(err2){
alert(err2.message);
return;
}

alert("Done");
location.reload();
}

</script>

</body>
</html>
