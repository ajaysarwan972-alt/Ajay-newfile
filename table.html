<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    padding: 10px;
}

.frame {
    width: 100%;
    height: 300px;
    overflow: auto;
    background: white;
    border-radius: 10px;
}

table {
    min-width: 600px;
    border-collapse: collapse;
}

td, th {
    padding: 8px;
    border: 1px solid #ccc;
    text-align: center;
}
</style>
</head>

<body>

<h2>login</h2>

<div class="frame">
<table>
<thead>
<tr>
<th>id</th>
<th>name</th>
<th>mobile</th>
<th>password</th>
<th>balance</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>
</div>

<script>
const supabase = window.supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
)

async function loadData(){
    const { data, error } = await supabase
    .from("login")
    .select("*")

    console.log(data, error)

    if(error){
        alert("Error aa raha hai")
        return
    }

    let html = ""

    data.forEach(row => {
        html += `
        <tr>
            <td>${row.id}</td>
            <td>${row.name}</td>
            <td>${row.mobile}</td>
            <td>${row.password}</td>
            <td>${row.balance}</td>
        </tr>`
    })

    document.getElementById("data").innerHTML = html
}

loadData()
</script>

</body>
</html>
