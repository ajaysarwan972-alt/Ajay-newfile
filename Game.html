<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Games</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;margin:0;background:#f2f2f2;}

.header{
position:fixed;top:10px;left:10px;right:10px;
background:#fff;padding:10px;border-radius:20px;
display:flex;justify-content:space-between;
}

#userId{background:green;color:#fff;padding:5px 10px;border-radius:20px;}
#wallet{background:red;color:#fff;padding:5px 10px;border-radius:20px;}

.topBtns{
margin-top:80px;
display:flex;
justify-content:space-around;
}

.topBtn{
padding:10px;
border-radius:20px;
color:#fff;
cursor:pointer;
width:23%;
text-align:center;
}

.btn1{background:#6c5ce7;}
.btn2{background:#00b894;}
.btn3{background:#0984e3;}
.btn4{background:#e17055;}

.game{display:none;padding:10px;}
.active{display:block;}

.box{background:#fff;padding:10px;margin:5px;border-radius:10px;text-align:center;}
input{width:90%;padding:5px;margin-top:5px;}

.bottom{
position:fixed;bottom:0;width:100%;display:flex;
}
.total{width:50%;background:red;color:#fff;text-align:center;padding:10px;}
.submit{width:50%;background:green;color:#fff;text-align:center;padding:10px;}
</style>
</head>

<body>

<div class="header">
<div id="userId">ID: 0</div>
<div id="wallet">₹ 0</div>
</div>

<div class="topBtns">
<div class="topBtn btn1" onclick="showGame('jodi')">JODI</div>
<div class="topBtn btn2" onclick="showGame('haruf')">HARUF</div>
<div class="topBtn btn3" onclick="showGame('crossing')">CROSSING</div>
<div class="topBtn btn4" onclick="showGame('copy')">COPY PASTE</div>
</div>

<!-- JODI -->
<div id="jodi" class="game active">
<div id="jodiGrid"></div>
</div>

<!-- HARUF -->
<div id="haruf" class="game">
<div id="harufGrid"></div>
</div>

<!-- CROSSING -->
<div id="crossing" class="game">
<input id="num1" placeholder="1st number">
<input id="num2" placeholder="2nd number">
<input id="points" placeholder="Amount">
<button onclick="generateCross()">SET</button>
<div id="crossGrid"></div>
</div>

<!-- COPY -->
<div id="copy" class="game">
<input id="digits" placeholder="digits">
<input id="amt" placeholder="amount">
<button onclick="generateCopy()">ADD</button>
<div id="copyList"></div>
</div>

<div class="bottom">
<div class="total" id="total">₹ 0</div>
<div class="submit" onclick="submitAll()">SUBMIT</div>
</div>

<script>

const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

const user = JSON.parse(localStorage.getItem("user"));
const market = localStorage.getItem("market") || "UNKNOWN";

let total = 0;
let dataArr = [];

// SWITCH
function showGame(id){
document.querySelectorAll(".game").forEach(g=>g.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// WALLET
async function loadWallet(){
let {data} = await client.from("login").select("balance").eq("id",user.id).single();
wallet.innerText="₹ "+data.balance;
userId.innerText="ID: "+user.id;
}
loadWallet();

// JODI
for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');
let div=document.createElement("div");
div.className="box";
div.innerHTML=`${num}<br><input oninput="calc()">`;
jodiGrid.appendChild(div);
}

// HARUF (same logic)
for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');
let div=document.createElement("div");
div.className="box";
div.innerHTML=`${num}<br><input oninput="calc()">`;
harufGrid.appendChild(div);
}

function calc(){
let inputs=document.querySelectorAll("input");
total=0;
dataArr=[];
inputs.forEach((inp,i)=>{
let v=Number(inp.value)||0;
if(v>0){
dataArr.push({number:i.toString().padStart(2,'0'),amount:v});
total+=v;
}
});
document.getElementById("total").innerText="₹ "+total;
}

// CROSSING
function generateCross(){
let n1=num1.value,n2=num2.value,a=Number(points.value);
for(let i of n1){
for(let j of n2){
let num=i+j;
dataArr.push({number:num,amount:a});
total+=a;
}
}
document.getElementById("total").innerText="₹ "+total;
}

// COPY
function generateCopy(){
let d=digits.value,a=Number(amt.value);
let arr=d.match(/.{1,2}/g);
arr.forEach(num=>{
dataArr.push({number:num,amount:a});
total+=a;
});
document.getElementById("total").innerText="₹ "+total;
}

// SUBMIT
async function submitAll(){
if(total<=0){alert("No data");return;}

let {data}=await client.from("login").select("balance").eq("id",user.id).single();

if(data.balance<total){
alert("Low balance");
return;
}

await client.from("login").update({balance:data.balance-total}).eq("id",user.id);

await client.from("history").insert([{
user_id:user.id,
market:market,
data:JSON.stringify(dataArr),
total:total
}]);

alert("Done");
location.reload();
}

</script>

</body>
</html>
