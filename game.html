<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dealer Game</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;background:#0b0f1a;font-family:Arial;color:#fff;}

#dealerId{
position:fixed;
left:10px;
top:10px;
background:green;
padding:6px 12px;
border-radius:20px;
}

#wallet{
position:fixed;
right:10px;
top:10px;
background:red;
padding:6px 12px;
border-radius:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:6px;
padding:10px;
margin-top:60px;
}

.box{
border:1px solid #333;
border-radius:8px;
padding:6px;
text-align:center;
}

.num{color:#00e5ff;font-size:14px;}
.amt{font-size:13px;margin-top:4px;}

/* ✅ NEW SMALL BOX SECTION */
.section{
padding:10px;
}

.title{
margin:10px 0;
font-size:16px;
font-weight:bold;
}

.smallGrid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
}

.sbox{
background:#111;
border-radius:10px;
padding:8px;
text-align:center;
}

.snum{font-size:14px;color:#00e5ff;}
.samt{font-size:12px;margin-top:3px;}
</style>
</head>

<body>

<div id="dealerId">ID</div>
<div id="wallet">₹ 0</div>

<div class="grid" id="grid"></div>

<!-- ✅ NEW -->
<div class="section">

<div class="title">Single Andar</div>
<div class="smallGrid" id="andar"></div>

<div class="title">Single Bahar</div>
<div class="smallGrid" id="bahar"></div>

</div>

<script>

const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

const dealer = JSON.parse(localStorage.getItem("dealer"));

// ✅ TOP DATA
async function loadTop(){
let {data} = await client
.from("dealers")
.select("balance")
.eq("id", dealer.id)
.single();

wallet.innerText = "₹ " + data.balance;
dealerId.innerText = "ID: " + dealer.id;
}
loadTop();

// ✅ MAIN GRID
for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');

grid.innerHTML+=`
<div class="box">
<div class="num">${num}</div>
<div class="amt" id="amt_${num}"></div>
</div>
`;
}

// ✅ SMALL BOX CREATE
for(let i=0;i<10;i++){

andar.innerHTML+=`
<div class="sbox">
<div class="snum">${i}</div>
<div class="samt" id="andar_${i}"></div>
</div>
`;

bahar.innerHTML+=`
<div class="sbox">
<div class="snum">${i}</div>
<div class="samt" id="bahar_${i}"></div>
</div>
`;

}


// ✅ DATA LOAD
async function loadData(){

let {data} = await client.from("history").select("data");

let map = {};
let andarMap = {};
let baharMap = {};

data.forEach(row=>{

let arr = JSON.parse(row.data);

arr.forEach(item=>{

let num = item.number;
let amt = item.amount;

// main
if(!map[num]) map[num]=0;
map[num]+=amt;

// andar (last digit)
let a = num % 10;
if(!andarMap[a]) andarMap[a]=0;
andarMap[a]+=amt;

// bahar (first digit)
let b = Math.floor(num/10);
if(!baharMap[b]) baharMap[b]=0;
baharMap[b]+=amt;

});

});

// fill main
for(let num in map){
let el = document.getElementById("amt_"+num);
if(el) el.innerText = map[num];
}

// fill andar
for(let i in andarMap){
let el = document.getElementById("andar_"+i);
if(el) el.innerText = andarMap[i];
}

// fill bahar
for(let i in baharMap){
let el = document.getElementById("bahar_"+i);
if(el) el.innerText = baharMap[i];
}

}

loadData();

</script>

</body>
</html>
