<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Games</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;margin:0;background:#e5e7eb;padding-bottom:80px;}
.header{position:fixed;top:10px;left:10px;right:10px;background:#fff;padding:10px;border-radius:20px;display:flex;justify-content:space-between;}
#userId{background:green;color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;}
#wallet{background:red;color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;}

.topMode{margin-top:70px;display:flex;justify-content:center;gap:10px;}
.modeBtn{padding:10px 20px;border-radius:20px;color:#fff;cursor:pointer;}
.m1{background:blue;}
.m2{background:black;}

.topBtns{margin-top:10px;display:flex;justify-content:space-around;}
.topBtn{width:18%;padding:10px;border-radius:20px;color:#fff;text-align:center;font-size:12px;}

.game{display:none;}
.active{display:block;}

.container{margin:10px;background:#fff;padding:15px;border-radius:15px;padding-bottom:150px;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.box{background:#fff;padding:10px;border-radius:10px;text-align:center;border:1px solid #ddd;}
input{width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;}

.bottom{position:fixed;bottom:0;width:100%;display:flex;}
.total{width:50%;background:linear-gradient(to right,blue,red);color:#fff;text-align:center;padding:15px;}
.submit{width:50%;background:green;color:#fff;text-align:center;padding:15px;cursor:pointer;}
</style>
</head>

<body>

<div class="header">
<div id="userId">ID: 0</div>
<div id="wallet">₹ 0</div>
</div>

<div class="topMode">
<div class="modeBtn m1" onclick="setMode(1)">Mode 1</div>
<div class="modeBtn m2" onclick="setMode(2)">Mode 2</div>
</div>

<div class="topBtns">
<div class="topBtn" onclick="showGame('jodi')">JODI</div>
<div class="topBtn" onclick="showGame('haruf')">HARUF</div>
<div class="topBtn" onclick="showGame('crossing')">CROSSING</div>
<div class="topBtn" onclick="showGame('copy')">COPY</div>
</div>

<div id="jodi" class="game active container">
<div class="grid" id="jodiGrid"></div>
</div>

<div id="haruf" class="game container">
<h3>Andar</h3>
<div class="grid" id="harufGrid1"></div>
<h3>Bahar</h3>
<div class="grid" id="harufGrid2"></div>
</div>

<div id="crossing" class="game container">
<input id="num1" placeholder="1st number">
<input id="num2" placeholder="2nd number">
<input id="points" placeholder="Amount">
<button onclick="generateCross()">SET</button>
<div id="crossGrid"></div>
</div>

<div id="copy" class="game container">
<input id="digits" placeholder="Digits">
<input id="amt" placeholder="Amount">
<button onclick="generateCopy()">ADD</button>

<table id="table" border="1" width="100%">
<tr><th>NUMBER</th><th>AMOUNT</th></tr>
</table>
</div>

<div class="bottom">
<div class="total" id="total">₹ 0</div>
<div class="submit" onclick="submitAll()">SUBMIT</div>
</div>

<script>

let mode = 1;
function setMode(m){ mode = m; }

function checkAmount(val){
val = Number(val)||0;
if(mode===2 && val%10!==0){
alert("Sirf 10,20,30 allowed");
return false;
}
return true;
}

const client = supabase.createClient("https://katbdbzoufiblnnsoxkk.supabase.co","sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a");

const user = JSON.parse(localStorage.getItem("user"));
document.getElementById("userId").innerText="ID: "+user.id;

const market = localStorage.getItem("market") || "XXX";

let dataArr=[], total=0;

function updateTotal(){
total=0;
dataArr.forEach(i=>total+=i.amount);
document.getElementById("total").innerText="₹ "+total;
}

function showGame(id){
document.querySelectorAll(".game").forEach(g=>g.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// JODI
for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');
jodiGrid.innerHTML+=`<div class="box">${num}<input oninput="add('${num}',this.value)"></div>`;
}

// HARUF
for(let i=0;i<10;i++){
harufGrid1.innerHTML+=`<div class="box">${i}<input oninput="add('A${i}',this.value)"></div>`;
harufGrid2.innerHTML+=`<div class="box">${i}<input oninput="add('B${i}',this.value)"></div>`;
}

function add(num,val){

if(!checkAmount(val)) return;

val=Number(val)||0;

dataArr=dataArr.filter(x=>x.number!==num);

if(val>0){
dataArr.push({number:num,amount:val});
}

updateTotal();
}

function generateCross(){
let n1=num1.value,n2=num2.value,a=Number(points.value);

if(!checkAmount(a)) return;

dataArr=[];

for(let i of n1){
for(let j of n2){
dataArr.push({number:i+j,amount:a});
}}

updateTotal();
}

function generateCopy(){
let d=digits.value,a=Number(amt.value);

if(!checkAmount(a)) return;

dataArr=[];

let arr=d.match(/.{1,2}/g)||[];

arr.forEach(n=>{
if(n.length==1) n="0"+n;
dataArr.push({number:n,amount:a});
});

updateTotal();
}

// SUBMIT (same system)
async function submitAll(){

if(dataArr.length===0){
alert("Kuch add karo pehle");
return;
}

let {data:userData} = await client
.from("login")
.select("balance")
.eq("id", user.id)
.single();

if(userData.balance < total){
alert("LOW BALANCE");
return;
}

await client.from("login")
.update({balance: userData.balance - total})
.eq("id", user.id);

await client.from("history")
.insert([{
user_id:user.id,
market:market,
data:dataArr,
total:total,
mode:mode,
created_at:new Date()
}]);

alert("GAME OK");

dataArr=[];
total=0;
updateTotal();
document.querySelectorAll("input").forEach(i=>i.value="");
}

</script>

</body>
</html>
