<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Games</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;margin:0;background:#f2f2f2;}

.header{
position:fixed;top:10px;left:10px;right:10px;
display:flex;justify-content:space-between;
padding:10px;
}

#userId{background:#4CAF50;color:#fff;padding:8px 20px;border-radius:20px;}
#wallet{background:#ff0000;color:#fff;padding:8px 20px;border-radius:20px;}

.topBtns{
margin-top:80px;
text-align:center;
}

.topBtns button{
padding:12px 20px;
margin:5px;
border:none;
border-radius:20px;
background:#e74c3c;
color:#fff;
font-weight:bold;
}

.activeBtn{background:#8BC34A !important;}

.game{display:none;padding:10px;}
.active{display:block;}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.box{
background:#fff;
padding:15px;
border-radius:10px;
text-align:center;
}

.box input{
width:90%;
padding:5px;
margin-top:5px;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
}

.total{
width:50%;
background:linear-gradient(to right,blue,red);
color:#fff;
text-align:center;
padding:15px;
}

.submit{
width:50%;
background:#8BC34A;
color:#fff;
text-align:center;
padding:15px;
}
</style>
</head>

<body>

<div class="header">
<div id="userId">ID: 0</div>
<div id="wallet">₹ 0</div>
</div>

<div class="topBtns">
<button id="btn1" onclick="showGame('jodi',this)">JODI</button>
<button id="btn2" onclick="showGame('haruf',this)">HARUF</button>
<button id="btn3" onclick="showGame('crossing',this)">CROSSING</button>
<button id="btn4" onclick="showGame('copy',this)">COPY PASTE</button>
</div>

<!-- JODI -->
<div id="jodi" class="game active">
<div class="grid" id="jodiGrid"></div>
</div>

<!-- HARUF -->
<div id="haruf" class="game">
<h3>Single Andar</h3>
<div class="grid" id="harufGrid1"></div>

<h3>Single Bahar</h3>
<div class="grid" id="harufGrid2"></div>
</div>

<!-- CROSSING -->
<div id="crossing" class="game">
<input id="c_num1" placeholder="1st number">
<input id="c_num2" placeholder="2nd number">
<input id="c_amt" placeholder="Points">
<button onclick="generateCross()">SUBMIT</button>
</div>

<!-- COPY -->
<div id="copy" class="game">
<input id="digits" placeholder="Enter Digit">
<input id="amt" placeholder="Amount">
<br><br>
<label><input type="radio" name="type" value="with" checked> With Palti</label>
<label><input type="radio" name="type" value="without"> Without Palti</label>
</div>

<div class="bottom">
<div class="total" id="total">₹ 0</div>
<div class="submit" onclick="submitAll()">SUBMIT</div>
</div>

<script>

const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

const user = JSON.parse(localStorage.getItem("user"));
const market = localStorage.getItem("market") || "UNKNOWN";

let total = 0;
let dataArr = [];

// SWITCH GAME
function showGame(id,btn){
document.querySelectorAll(".game").forEach(g=>g.classList.remove("active"));
document.getElementById(id).classList.add("active");

document.querySelectorAll(".topBtns button").forEach(b=>b.classList.remove("activeBtn"));
btn.classList.add("activeBtn");
}

// WALLET
async function loadWallet(){
let {data} = await client.from("login").select("balance").eq("id",user.id).single();
wallet.innerText="₹ "+data.balance;
userId.innerText="ID: "+user.id;
}
loadWallet();

// JODI
for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');
let div=document.createElement("div");
div.className="box";
div.innerHTML=`${num}<br><input oninput="addData('${num}',this.value)">`;
jodiGrid.appendChild(div);
}

// HARUF
for(let i=0;i<10;i++){
let div=document.createElement("div");
div.className="box";
div.innerHTML=`${i}<br><input oninput="addData('${i}',this.value)">`;
harufGrid1.appendChild(div);
harufGrid2.appendChild(div.cloneNode(true));
}

// ADD DATA
function addData(num,val){
val = Number(val)||0;
if(val>0){
dataArr.push({number:num,amount:val});
total+=val;
}
document.getElementById("total").innerText="₹ "+total;
}

// CROSSING
function generateCross(){
let n1=c_num1.value,n2=c_num2.value,a=Number(c_amt.value);
for(let i of n1){
for(let j of n2){
dataArr.push({number:i+j,amount:a});
total+=a;
}
}
document.getElementById("total").innerText="₹ "+total;
}

// COPY
function generateCopy(){
let d=digits.value,a=Number(amt.value);
let arr=d.match(/.{1,2}/g);
arr.forEach(num=>{
dataArr.push({number:num,amount:a});
total+=a;
});
}

// SUBMIT
async function submitAll(){
if(total<=0){alert("No data");return;}

let {data}=await client.from("login").select("balance").eq("id",user.id).single();

if(data.balance<total){
alert("Low balance");
return;
}

await client.from("login").update({balance:data.balance-total}).eq("id",user.id);

await client.from("history").insert([{
user_id:user.id,
market:market,
data:JSON.stringify(dataArr),
total:total
}]);

alert("Done");
location.reload();
}

</script>

</body>
</html>
