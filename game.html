<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;margin:0;background:#f1f5f9;}

.header{
display:flex;justify-content:space-between;
padding:10px;background:#fff;
}

.boxBtn{
display:flex;gap:10px;padding:10px;
}

.btn{
flex:1;padding:12px;
border-radius:10px;
text-align:center;
color:#fff;font-weight:bold;
cursor:pointer;
}

.typing{background:#3b82f6;}
.image{background:#10b981;}

.hide{display:none;}

.container{padding:10px;}

.game{display:none;}
.active{display:block;}

.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.box{background:#fff;padding:10px;border-radius:10px;text-align:center;border:1px solid #ddd;}

.bottom{position:fixed;bottom:0;width:100%;display:flex;}
.total{width:50%;background:blue;color:#fff;text-align:center;padding:15px;}
.submit{width:50%;background:green;color:#fff;text-align:center;padding:15px;}
</style>
</head>

<body>

<div class="header">
<div id="userId">ID: 0</div>
<div id="wallet">₹ 0</div>
</div>

<!-- 🔥 TOP BUTTON -->
<div class="boxBtn">
<div class="btn typing" onclick="showMain('typingBox')">Typing</div>
<div class="btn image" onclick="showMain('imageBox')">Image</div>
</div>

<div class="container">

<!-- ================= TYPING ================= -->
<div id="typingBox">

<textarea id="typingData" placeholder="Enter game"></textarea>
<input type="number" id="typingAmount" placeholder="Amount">

<div class="btn typing" onclick="submitTyping()">SUBMIT</div>

</div>

<!-- ================= IMAGE ================= -->
<div id="imageBox" class="hide">

<input type="file" id="imageInput">
<input type="number" id="imageAmount" placeholder="Amount">

<div class="btn image" onclick="submitImage()">SUBMIT</div>

</div>

<!-- ================= GAME ================= -->
<div id="gameBox">

<div style="display:flex;gap:10px;margin-top:10px;">
<button onclick="showGame('jodi')">Jodi</button>
<button onclick="showGame('haruf')">Haruf</button>
</div>

<div id="jodi" class="game active">
<div class="grid" id="jodiGrid"></div>
</div>

<div id="haruf" class="game">
<div class="grid" id="harufGrid"></div>
</div>

</div>

</div>

<div class="bottom">
<div class="total" id="total">₹ 0</div>
<div class="submit" onclick="submitGame()">SUBMIT</div>
</div>

<script>

const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

const user = JSON.parse(localStorage.getItem("user"));
const market = localStorage.getItem("market");

let total=0;
let dataArr=[];

function showMain(id){
typingBox.classList.add("hide");
imageBox.classList.add("hide");
document.getElementById(id).classList.remove("hide");
}

function showGame(id){
document.querySelectorAll(".game").forEach(e=>e.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// wallet
async function loadWallet(){
let {data}=await client.from("login").select("balance").eq("id",user.id).single();
wallet.innerText="₹ "+data.balance;
userId.innerText="ID: "+user.id;
}
loadWallet();

// JODI
for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');
jodiGrid.innerHTML+=`<div class="box">${num}<input oninput="add('${num}',this.value)"></div>`;
}

// HARUF
for(let i=0;i<10;i++){
harufGrid.innerHTML+=`<div class="box">${i}<input oninput="add('${i}',this.value)"></div>`;
}

function add(num,val){
val=Number(val)||0;
if(val>0){
dataArr.push({number:num,amount:val});
total+=val;
}
document.getElementById("total").innerText="₹ "+total;
}

// ================== SUBMIT GAME ==================
async function submitGame(){

if(total<=0) return alert("No data");

let {data}=await client.from("login").select("balance").eq("id",user.id).single();

if(data.balance<total){
alert("Low balance");
return;
}

await client.from("login").update({balance:data.balance-total}).eq("id",user.id);

await client.from("history").insert([{
user_id:user.id,
market:market,
data:JSON.stringify(dataArr),
total:total
}]);

alert("Done");
location.reload();
}

// ================== TYPING ==================
async function submitTyping(){

let text=typingData.value;
let amount=Number(typingAmount.value);

if(!text || amount<=0) return alert("Fill");

await client.from("history").insert([{
user_id:user.id,
market:market,
typing:text,
total:amount,
image:null
}]);

alert("Done");
location.reload();
}

// ================== IMAGE ==================
async function submitImage(){

let file=imageInput.files[0];
let amount=Number(imageAmount.value);

if(!file || amount<=0) return alert("Fill");

let name=Date.now()+file.name;

await client.storage.from("screenshots").upload(name,file);

let {data}=client.storage.from("screenshots").getPublicUrl(name);

await client.from("history").insert([{
user_id:user.id,
market:market,
typing:null,
total:amount,
image:data.publicUrl
}]);

alert("Done");
location.reload();
}

</script>

</body>
</html>
