<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Games</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;margin:0;background:#e5e7eb;}

.header{
position:fixed;top:10px;left:10px;right:10px;
background:#fff;padding:10px;border-radius:20px;
display:flex;justify-content:space-between;
z-index:999;
}

#userId{background:green;color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;}
#wallet{background:red;color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;}

.topBtns{margin-top:80px;display:flex;justify-content:space-around;}
.topBtn{width:22%;padding:10px;border-radius:20px;color:#fff;text-align:center;cursor:pointer;font-size:12px;}
.btn1{background:#6c5ce7;}
.btn2{background:#00b894;}
.btn3{background:#0984e3;}
.btn4{background:#e17055;}

.game{display:none;}
.active{display:block;}

.container{margin:10px;background:#fff;padding:15px;border-radius:15px;padding-bottom:120px;}

.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.box{background:#fff;padding:10px;border-radius:10px;text-align:center;border:1px solid #ddd;}
input,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;}

.bottom{position:fixed;bottom:0;width:100%;display:flex;}
.total{width:50%;background:linear-gradient(to right,blue,red);color:#fff;text-align:center;padding:15px;}
.submit{width:50%;background:green;color:#fff;text-align:center;padding:15px;}
</style>
</head>

<body>

<div class="header">
<div id="userId">ID: 0</div>
<div id="wallet">₹ 0</div>
</div>

<!-- 🔥 BUTTONS -->
<div class="topBtns">
<div class="topBtn btn1" onclick="showGame('jodi')">JODI</div>
<div class="topBtn btn2" onclick="showGame('haruf')">HARUF</div>
<div class="topBtn btn3" onclick="showGame('crossing')">CROSSING</div>
<div class="topBtn btn4" onclick="showGame('copy')">COPY</div>
<div class="topBtn btn4" onclick="showGame('play')">TYPING/IMAGE</div>
</div>

<!-- JODI -->
<div id="jodi" class="game active container">
<div class="grid" id="jodiGrid"></div>
</div>

<!-- HARUF -->
<div id="haruf" class="game container">
<div class="grid" id="harufGrid"></div>
</div>

<!-- CROSSING -->
<div id="crossing" class="game container">
<div class="grid" id="crossGrid"></div>
</div>

<!-- COPY -->
<div id="copy" class="game container">
<div class="grid" id="copyGrid"></div>
</div>

<!-- 🔥 PLAY SYSTEM ADD -->
<div id="play" class="game container">

<div style="display:flex;gap:10px;margin-bottom:10px;">
<button onclick="showPlay('typing')">Typing</button>
<button onclick="showPlay('image')">Image</button>
</div>

<div id="typingBox">
<textarea id="typingData" placeholder="Enter your game"></textarea>
<input id="typingAmount" placeholder="Enter Total Amount">
<div class="submit" onclick="submitTyping()">SUBMIT</div>
</div>

<div id="imageBox" style="display:none;">
<input type="file" id="imageInput">
<input id="imageAmount" placeholder="Enter Total Amount">
<div class="submit" onclick="submitImage()">SUBMIT</div>
</div>

</div>

<div class="bottom">
<div class="total" id="total">₹ 0</div>
<div class="submit" onclick="submitAll()">SUBMIT</div>
</div>

<script>

const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

const user = JSON.parse(localStorage.getItem("user"));
const market = localStorage.getItem("market") || "UNKNOWN";

let total=0;
let dataArr=[];

function showGame(id){
document.querySelectorAll(".game").forEach(g=>g.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

async function loadWallet(){
let {data}=await client.from("login").select("balance").eq("id",user.id).single();
wallet.innerText="₹ "+data.balance;
userId.innerText="ID: "+user.id;
}
loadWallet();

// JODI
for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');
jodiGrid.innerHTML+=`<div class="box">${num}<input oninput="add('${num}',this.value)"></div>`;
}

// HARUF
for(let i=0;i<10;i++){
harufGrid.innerHTML+=`<div class="box">${i}<input oninput="add('${i}',this.value)"></div>`;
}

// CROSSING + COPY
for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');
crossGrid.innerHTML+=`<div class="box">${num}<input oninput="add('${num}',this.value)"></div>`;
copyGrid.innerHTML+=`<div class="box">${num}<input oninput="add('${num}',this.value)"></div>`;
}

function add(num,val){
val=Number(val)||0;
if(val>0){
dataArr.push({number:num,amount:val});
total+=val;
}
totalBox();
}

function totalBox(){
document.getElementById("total").innerText="₹ "+total;
}

// GAME SUBMIT
async function submitAll(){
if(total<=0){alert("No data");return;}

let {data}=await client.from("login").select("balance").eq("id",user.id).single();

if(data.balance<total){
alert("Low balance");
return;
}

await client.from("login").update({balance:data.balance-total}).eq("id",user.id);

await client.from("history").insert([{
user_id:user.id,
market:market,
data:JSON.stringify(dataArr),
total:total
}]);

alert("Done");
location.reload();
}

// PLAY SWITCH
function showPlay(type){
typingBox.style.display="none";
imageBox.style.display="none";

if(type=="typing"){
typingBox.style.display="block";
}else{
imageBox.style.display="block";
}
}

// TYPING
async function submitTyping(){

let text=typingData.value;
let amount=Number(typingAmount.value);

if(!text || amount<=0){
alert("Fill all fields");
return;
}

let {data}=await client.from("login").select("balance").eq("id",user.id).single();

if(data.balance<amount){
alert("Low balance");
return;
}

await client.from("login").update({balance:data.balance-amount}).eq("id",user.id);

await client.from("history").insert([{
user_id:user.id,
market:market,
typing:text,
total:amount,
image:null
}]);

alert("Done");
location.reload();
}

// IMAGE
async function submitImage(){

let file=imageInput.files[0];
let amount=Number(imageAmount.value);

if(!file || amount<=0){
alert("Fill all fields");
return;
}

let name=Date.now()+file.name;

await client.storage.from("screenshots").upload(name,file);

let {data}=client.storage.from("screenshots").getPublicUrl(name);

let {data:userData}=await client.from("login").select("balance").eq("id",user.id).single();

if(userData.balance<amount){
alert("Low balance");
return;
}

await client.from("login").update({balance:userData.balance-amount}).eq("id",user.id);

await client.from("history").insert([{
user_id:user.id,
market:market,
typing:null,
total:amount,
image:data.publicUrl
}]);

alert("Done");
location.reload();
}

</script>

</body>
</html>
